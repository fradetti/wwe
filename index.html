<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext x='32' y='48' font-size='48' text-anchor='middle'%3E%E2%9C%88%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0f;
    --bg-raised: #14141a;
    --surface: #1c1c25;
    --surface-hover: #22222e;
    --border: #2a2a38;
    --border-subtle: #1f1f2a;
    --text: #e8e6f0;
    --text-secondary: #9896a8;
    --muted: #6b6980;
    --accent: #c9a227;
    --accent-dim: rgba(201,162,39,.12);
    --accent-glow: rgba(201,162,39,.25);
    --green: #34d399;
    --green-dim: rgba(52,211,153,.1);
    --red: #f87171;
    --red-dim: rgba(248,113,113,.1);
    --gold: #f0c040;
    --gold-dim: rgba(240,192,64,.1);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,.1);
    --radius: 10px;
    --radius-lg: 16px;
    --shadow: 0 2px 12px rgba(0,0,0,.4);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.5);
    --font-display: 'Outfit', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --transition: .2s cubic-bezier(.4,0,.2,1);
  }

  html.light {
    --bg: #f0ede6;
    --bg-raised: #f7f5ef;
    --surface: #ffffff;
    --surface-hover: #faf9f5;
    --border: #e0ddd3;
    --border-subtle: #eae7df;
    --text: #1a1820;
    --text-secondary: #5c5a68;
    --muted: #8a8898;
    --accent: #9a7b1a;
    --accent-dim: rgba(154,123,26,.08);
    --accent-glow: rgba(154,123,26,.15);
    --green: #16a34a;
    --green-dim: rgba(22,163,74,.08);
    --red: #dc2626;
    --red-dim: rgba(220,38,38,.08);
    --gold: #b8860b;
    --gold-dim: rgba(184,134,11,.08);
    --blue: #2563eb;
    --blue-dim: rgba(37,99,235,.08);
    --shadow: 0 2px 12px rgba(0,0,0,.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background var(--transition), color var(--transition);
    -webkit-font-smoothing: antialiased;
  }

  /* Layout */
  .shell {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 1.25rem 3rem;
  }

  /* Header */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 0 1.25rem;
    border-bottom: 1px solid var(--border-subtle);
    margin-bottom: 1.5rem;
  }
  .topbar-brand {
    display: flex;
    align-items: center;
    gap: .65rem;
  }
  .topbar-brand h1 {
    font-family: var(--font-display);
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -.03em;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .topbar-mark {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .85rem;
    line-height: 1;
  }
  .theme-toggle {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    line-height: 1;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--text); }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 2px;
    background: var(--border-subtle);
    border-radius: var(--radius);
    padding: 3px;
    margin-bottom: 1.5rem;
  }
  .tab-btn {
    flex: 1;
    background: transparent;
    color: var(--muted);
    border: none;
    padding: .6rem 1rem;
    border-radius: calc(var(--radius) - 2px);
    font-family: var(--font-body);
    font-size: .82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    position: relative;
  }
  .tab-btn:hover { color: var(--text-secondary); }
  .tab-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow);
    font-weight: 600;
  }

  /* Banner */
  .banner {
    text-align: center;
    padding: 1rem 1.25rem;
    border-radius: var(--radius-lg);
    margin-bottom: 1.25rem;
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: -.01em;
    border: 1px solid transparent;
  }
  .banner.alert {
    background: linear-gradient(135deg, rgba(52,211,153,.15), rgba(52,211,153,.05));
    border-color: rgba(52,211,153,.3);
    color: var(--green);
  }
  .banner.waiting {
    background: var(--surface);
    border-color: var(--border);
    color: var(--text-secondary);
    font-weight: 500;
  }
  .banner.error {
    background: var(--red-dim);
    border-color: rgba(248,113,113,.3);
    color: var(--red);
  }

  /* Meta pills */
  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: .5rem;
    justify-content: center;
    margin-bottom: 1.25rem;
    font-size: .78rem;
    color: var(--text-secondary);
  }
  .meta span {
    background: var(--bg-raised);
    padding: .3rem .7rem;
    border-radius: 20px;
    border: 1px solid var(--border-subtle);
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1.25rem;
    box-shadow: var(--shadow);
    transition: background var(--transition), border var(--transition);
  }
  .card h2 {
    font-family: var(--font-display);
    font-size: .72rem;
    font-weight: 600;
    margin-bottom: .75rem;
    color: var(--accent);
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: .75rem;
    flex-wrap: wrap;
    gap: .5rem;
  }
  .card-header h2 { margin-bottom: 0; }

  /* Button groups */
  .btn-group { display: flex; gap: .35rem; flex-wrap: wrap; }
  .toggle-btn {
    background: var(--bg-raised);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    padding: .3rem .75rem;
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: .75rem;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
  }
  .toggle-btn:hover { border-color: var(--accent); color: var(--text); }
  .toggle-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Tables */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: .82rem;
  }
  th {
    text-align: left;
    color: var(--muted);
    font-weight: 500;
    font-size: .72rem;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: .55rem .5rem;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: .65rem .5rem;
    border-bottom: 1px solid var(--border-subtle);
    transition: background var(--transition);
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--surface-hover); }

  /* Tags */
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .02em;
  }
  .tag.single { background: var(--green-dim); color: var(--green); }
  .tag.combo { background: rgba(168,85,247,.1); color: #a855f7; }
  .tag.available { background: var(--green-dim); color: var(--green); }
  .tag.unavailable { background: var(--red-dim); color: var(--red); }
  html.light .tag.combo { background: rgba(147,51,234,.08); color: #7c3aed; }

  a { color: var(--blue); text-decoration: none; font-weight: 500; }
  a:hover { text-decoration: underline; }

  /* Expandable event rows */
  .event-toggle { cursor: pointer; user-select: none; }
  .event-toggle:hover td { background: var(--surface-hover); }
  .event-toggle td:first-child::before {
    content: '\25B8';
    display: inline-block;
    margin-right: .4rem;
    font-size: .65rem;
    transition: transform var(--transition);
    color: var(--muted);
  }
  .event-toggle.open td:first-child::before { transform: rotate(90deg); }
  .pkg-row { display: none; }
  .pkg-row.visible { display: table-row; }
  .pkg-row td {
    padding-left: 1.6rem;
    font-size: .78rem;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border-subtle);
  }
  .pkg-row.unavailable-row { opacity: .35; }

  /* Flight stat cards */
  .flight-stats {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: .6rem;
    margin-bottom: 1.25rem;
  }
  .flight-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: .85rem .75rem;
    text-align: center;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .flight-stat::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    opacity: .5;
  }
  .flight-stat .fs-label {
    font-size: .65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    font-weight: 500;
  }
  .flight-stat .fs-value {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 800;
    margin-top: .15rem;
    letter-spacing: -.02em;
  }

  /* Flight filter buttons */
  .flight-filters {
    display: flex;
    gap: .35rem;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
    align-items: center;
  }
  .flight-filters .filter-label {
    font-size: .7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    font-weight: 500;
    margin-right: .3rem;
  }
  .flight-btn {
    background: var(--bg-raised);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    padding: .35rem .7rem;
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: .75rem;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
  }
  .flight-btn:hover { border-color: var(--accent); color: var(--text); }
  .flight-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }
  .flight-btn.meta-btn {
    font-size: .7rem;
    padding: .3rem .55rem;
    color: var(--muted);
    border-style: dashed;
  }
  .flight-btn.meta-btn:hover { color: var(--text-secondary); }

  /* Flight badges */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .02em;
  }
  .badge-green  { background: var(--green-dim); color: var(--green); }
  .badge-yellow { background: var(--gold-dim); color: var(--gold); }
  .badge-red    { background: var(--red-dim); color: var(--red); }
  .badge-grey   { background: var(--bg-raised); color: var(--muted); }
  .badge-blue   { background: var(--blue-dim); color: var(--blue); }

  .delay-green  { color: var(--green); font-weight: 700; }
  .delay-yellow { color: var(--gold); font-weight: 700; }
  .delay-red    { color: var(--red); font-weight: 700; }
  .delay-none   { color: var(--muted); }

  /* Loading & footer */
  .loading {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
    font-size: .9rem;
  }
  .footer {
    text-align: center;
    padding: 2.5rem 0 1rem;
    font-size: .72rem;
    color: var(--muted);
    border-top: 1px solid var(--border-subtle);
    margin-top: 1rem;
  }
  .footer button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: .72rem;
    font-family: var(--font-body);
    text-decoration: underline;
    text-underline-offset: 2px;
    margin-top: .4rem;
  }
  .footer button:hover { color: var(--text-secondary); }

  /* Responsive */
  @media (max-width: 640px) {
    .topbar-brand h1 { font-size: 1.1rem; }
    .banner { font-size: .88rem; padding: .85rem 1rem; }
    table { font-size: .76rem; }
    th, td { padding: .5rem .35rem; }
    .hide-mobile { display: none; }
    .flight-stats { grid-template-columns: repeat(2, 1fr); }
    .flight-stat .fs-value { font-size: 1.25rem; }
    .tabs { flex-wrap: nowrap; }
    .tab-btn { padding: .5rem .5rem; font-size: .78rem; }
  }
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-mark">&#9992;</div>
      <h1>Dashboard</h1>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Cambia tema">&#9790;</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="btn-ticketmaster" onclick="switchSource('ticketmaster')">Ticketmaster</button>
    <button class="tab-btn" id="btn-stubhub" onclick="switchSource('stubhub')">StubHub</button>
    <button class="tab-btn" id="btn-emirates" onclick="switchSource('emirates')">Emirates</button>
  </div>

  <div id="app">
    <div class="loading">Caricamento dati&hellip;</div>
  </div>

  <div id="scraping-status" style="display:none"></div>

  <div class="footer">
    <button onclick="toggleScrapingStatus()">Stato scraping</button>
  </div>
</div>

<script>
let DATA_URL = 'data/status.json';
let currentSource = 'ticketmaster';
let showOnlyAvailable = true;
let allExpanded = false;

// Theme
function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  document.getElementById('theme-btn').innerHTML = isLight ? '&#9728;' : '&#9790;';
}
(function initTheme() {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.documentElement.classList.add('light');
    document.getElementById('theme-btn').innerHTML = '&#9728;';
  }
})();

function timeAgo(iso) {
  if (!iso) return '\u2014';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return `${Math.round(diff)}s fa`;
  if (diff < 3600) return `${Math.round(diff / 60)}min fa`;
  if (diff < 86400) return `${Math.round(diff / 3600)}h fa`;
  return `${Math.round(diff / 86400)}g fa`;
}

function fmtDate(d) {
  if (!d) return '\u2014';
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function fmtPrice(p, currency) {
  if (p == null) return '\u2014';
  return `${p.toLocaleString('it-IT', {minimumFractionDigits: 2, maximumFractionDigits: 2})} ${currency || '\u20AC'}`;
}

let currentData = null;

function render(data) {
  currentData = data;
  const app = document.getElementById('app');

  // Banner — alert only for Clash in Italy 31/05
  let bannerClass, bannerText;
  const clash = (data.events || []).find(e => e.name && e.name.includes('Clash in Italy'));
  const clashAvailPkgs = clash && clash.packages ? clash.packages.filter(p => p.available) : [];
  const clashMinPrice = clashAvailPkgs.length ? Math.min(...clashAvailPkgs.map(p => p.price)) : null;
  const clashAlert = clashMinPrice !== null && clashMinPrice < (data.threshold_eur || 400);

  if (data.errors && data.errors.length && !data.events.length) {
    bannerClass = 'error';
    bannerText = 'Errore nel controllo \u2014 riprovo tra 15 min';
  } else if (clashAlert) {
    bannerClass = 'alert';
    bannerText = `CLASH IN ITALY: biglietto disponibile a ${fmtPrice(clashMinPrice, '\u20AC')}!`;
  } else if (clashMinPrice !== null) {
    bannerClass = 'waiting';
    bannerText = `Clash in Italy: min. disponibile ${fmtPrice(clashMinPrice, '\u20AC')} (soglia: ${data.threshold_eur || 400}\u20AC)`;
  } else {
    bannerClass = 'waiting';
    bannerText = 'Clash in Italy: nessun biglietto disponibile al momento';
  }

  // Events + packages
  let rows = '';
  for (let ei = 0; ei < (data.events || []).length; ei++) {
    const e = data.events[ei];
    const tag = e.is_single_day
      ? '<span class="tag single">Singolo</span>'
      : '<span class="tag combo">Combo</span>';
    const link = e.url ? `<a href="${e.url}" target="_blank" rel="noopener">Acquista</a>` : '\u2014';
    const hasPkgs = e.packages && e.packages.length > 0;
    const toggleClass = hasPkgs ? 'event-toggle' : '';

    // Compute min/max based on filter
    let pMin = e.price_min, pMax = e.price_max;
    if (hasPkgs) {
      const filtered = showOnlyAvailable ? e.packages.filter(p => p.available) : e.packages;
      if (filtered.length) {
        const prices = filtered.map(p => p.price);
        pMin = Math.min(...prices);
        pMax = Math.max(...prices);
      } else {
        pMin = null;
        pMax = null;
      }
    }

    const venue = e.venue ? `<br><span style="font-size:.72rem;color:var(--muted)">${e.venue}</span>` : '';
    const openClass = allExpanded && hasPkgs ? ' open' : '';

    rows += `<tr class="${toggleClass}${openClass}" ${hasPkgs ? `onclick="togglePackages(${ei})" data-event="${ei}"` : ''}>
      <td>${e.name || '\u2014'}${venue}</td>
      <td>${fmtDate(e.date)}</td>
      <td>${tag}</td>
      <td>${fmtPrice(pMin, e.currency)}</td>
      <td class="hide-mobile">${fmtPrice(pMax, e.currency)}</td>
      <td>${link}</td>
    </tr>`;

    if (hasPkgs) {
      for (const pkg of e.packages) {
        const statusTag = pkg.available
          ? '<span class="tag available">Disponibile</span>'
          : '<span class="tag unavailable">Non disponibile</span>';
        const shouldShow = allExpanded && (pkg.available || !showOnlyAvailable);
        const hideClass = shouldShow ? 'visible' : '';
        const unavailClass = pkg.available ? '' : 'unavailable-row';
        rows += `<tr class="pkg-row pkg-event-${ei} ${hideClass} ${unavailClass}" data-available="${pkg.available}">
          <td>${pkg.name}</td>
          <td colspan="2">${statusTag}</td>
          <td>${fmtPrice(pkg.price, e.currency)}</td>
          <td class="hide-mobile" colspan="2"></td>
        </tr>`;
      }
    }
  }
  if (!data.events || !data.events.length) {
    rows = '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:2rem">Nessun evento trovato</td></tr>';
  }

  // Errors
  let errHtml = '';
  if (data.errors && data.errors.length) {
    errHtml = `<div class="card" style="border-color:var(--red)"><h2 style="color:var(--red)">Errori</h2><ul style="padding-left:1.2rem;font-size:.82rem">${data.errors.map(e => `<li>${e}</li>`).join('')}</ul></div>`;
  }

  const filterBtnClass = showOnlyAvailable ? 'toggle-btn active' : 'toggle-btn';
  const filterLabel = showOnlyAvailable ? 'Solo disponibili' : 'Tutti i pacchetti';
  const expandLabel = allExpanded ? 'Comprimi tutto' : 'Espandi tutto';

  app.innerHTML = `
    <div class="banner ${bannerClass}">${bannerText}</div>

    <div class="meta">
      <span>Ultimo check: ${timeAgo(data.last_check)}</span>
      <span>Controlli: ${data.checks_count || 0}</span>
      <span>Soglia: ${data.threshold_eur || 400}\u20AC</span>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Eventi e Pacchetti</h2>
        <div class="btn-group">
          <button class="toggle-btn" onclick="toggleExpandAll()">${expandLabel}</button>
          <button class="${filterBtnClass}" onclick="toggleFilter()">${filterLabel}</button>
        </div>
      </div>
      <p style="font-size:.75rem;color:var(--muted);margin-bottom:.75rem">Clicca su un evento per vedere i pacchetti</p>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Evento</th><th>Data</th><th>Tipo</th><th>Min</th><th class="hide-mobile">Max</th><th>Link</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>

    ${errHtml}
  `;
}

function togglePackages(eventIndex) {
  const row = document.querySelector(`tr[data-event="${eventIndex}"]`);
  const pkgRows = document.querySelectorAll(`.pkg-event-${eventIndex}`);
  const isOpen = row.classList.contains('open');

  if (isOpen) {
    row.classList.remove('open');
    pkgRows.forEach(r => r.classList.remove('visible'));
  } else {
    row.classList.add('open');
    pkgRows.forEach(r => {
      if (showOnlyAvailable && r.dataset.available === 'false') return;
      r.classList.add('visible');
    });
  }
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  if (currentData) render(currentData);
}

function toggleFilter() {
  showOnlyAvailable = !showOnlyAvailable;
  if (currentData) render(currentData);
}

function switchSource(source) {
  currentSource = source;
  if (source === 'emirates') DATA_URL = 'data/flights.json';
  else if (source === 'stubhub') DATA_URL = 'data/stubhub.json';
  else DATA_URL = 'data/status.json';
  document.getElementById('btn-ticketmaster').classList.toggle('active', source === 'ticketmaster');
  document.getElementById('btn-stubhub').classList.toggle('active', source === 'stubhub');
  document.getElementById('btn-emirates').classList.toggle('active', source === 'emirates');
  allExpanded = false;
  load();
}

async function load() {
  try {
    const resp = await fetch(DATA_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    if (currentSource === 'emirates') {
      const flights = Array.isArray(data) ? data : (data.flights || []);
      const lastCheck = Array.isArray(data) ? null : data.last_check;
      renderFlights(flights, lastCheck);
    } else {
      render(data);
    }
  } catch (e) {
    console.error('Load error:', e);
    const msgs = {
      stubhub: 'Dati StubHub non ancora disponibili',
      emirates: 'Dati Emirates non ancora disponibili',
    };
    const msg = msgs[currentSource] || 'Nessun dato disponibile \u2014 il primo check non \u00E8 ancora stato eseguito';
    document.getElementById('app').innerHTML =
      `<div class="banner waiting">${msg}</div>`;
  }
}

/* Emirates flights */
let flightsData = [];
let flightsLastCheck = null;

const FLIGHT_ROUTES = [
  { code: 'EK78',  label: 'EK78 NCE\u2192DXB' },
  { code: 'EK705', label: 'EK705 DXB\u2192SEZ' },
  { code: 'EK706', label: 'EK706 SEZ\u2192DXB' },
  { code: 'EK708', label: 'EK708 SEZ\u2192DXB' },
  { code: 'EK77',  label: 'EK77 DXB\u2192NCE' },
];
let flightFilter = new Set(FLIGHT_ROUTES.map(f => f.code));

function toggleFlightFilter(code) {
  if (flightFilter.has(code)) flightFilter.delete(code);
  else flightFilter.add(code);
  renderFlights(flightsData, flightsLastCheck);
}

function setAllFlights() {
  flightFilter = new Set(FLIGHT_ROUTES.map(f => f.code));
  renderFlights(flightsData, flightsLastCheck);
}

function setNoFlights() {
  flightFilter.clear();
  renderFlights(flightsData, flightsLastCheck);
}

function renderFlights(data, lastCheck) {
  flightsData = data;
  flightsLastCheck = lastCheck;
  const app = document.getElementById('app');

  // Filter data by selected flights
  const filtered = data.filter(r => flightFilter.has(r.flight));

  // Per-flight stats (in route order)
  const flightStats = FLIGHT_ROUTES.map(f => {
    const entries = data.filter(r => r.flight === f.code);
    const count = entries.length;
    const landedCount = entries.filter(r => r.status && r.status.toLowerCase() === 'landed').length;
    const cancelledCount = entries.filter(r => r.status && r.status.toLowerCase().includes('cancel')).length;
    const enRouteCount = entries.filter(r => {const s = (r.status||'').toLowerCase(); return s === 'en route' || s.includes('depart');}).length;
    const scheduledCount = entries.filter(r => {const s = (r.status||'').toLowerCase(); return s === 'scheduled' || s === 'future';}).length;
    const withDelay = entries.filter(r => getFlightDelay(r) !== null);
    const avg = withDelay.length ? Math.round(withDelay.reduce((s, r) => s + getFlightDelay(r), 0) / withDelay.length) : null;
    // Latest status: pick most recent entry by date
    const sorted = [...entries].sort((a, b) => b.date.localeCompare(a.date));
    const latest = sorted[0];
    const latestStatus = latest ? latest.status || 'Unknown' : '\u2014';
    return { ...f, count, landedCount, cancelledCount, enRouteCount, scheduledCount, avg, latestStatus };
  });

  // Flight filter buttons
  const filterBtns = FLIGHT_ROUTES.map(f =>
    `<button class="flight-btn ${flightFilter.has(f.code) ? 'active' : ''}" onclick="toggleFlightFilter('${f.code}')">${f.label}</button>`
  ).join('');

  // Table rows
  let rows = '';
  for (const r of filtered) {
    const delay = getFlightDelay(r);
    const dc = delay === null ? 'none' : delay < 15 ? 'green' : delay <= 45 ? 'yellow' : 'red';

    let statusBadge;
    const st = (r.status || '').toLowerCase();
    if (st.includes('cancel')) statusBadge = '<span class="badge badge-red">Cancelled</span>';
    else if (st === 'landed') statusBadge = '<span class="badge badge-green">Landed</span>';
    else if (st.includes('depart') || st === 'en route') statusBadge = `<span class="badge badge-blue">${r.status}</span>`;
    else if (st === 'scheduled') statusBadge = '<span class="badge badge-grey">Scheduled</span>';
    else statusBadge = `<span class="badge badge-grey">${r.status || 'Unknown'}</span>`;

    const delayStr = delay !== null ? `${delay >= 0 ? '+' : ''}${delay}m` : '\u2014';

    rows += `<tr>
      <td>${fmtDate(r.date)}</td>
      <td><strong>${r.flight}</strong></td>
      <td>${r.origin || ''} \u2192 ${r.destination || ''}</td>
      <td>${r.scheduled_departure || '\u2014'}</td>
      <td style="font-weight:600">${r.actual_departure || '\u2014'}</td>
      <td>${r.scheduled_arrival || '\u2014'}</td>
      <td style="font-weight:600">${r.actual_arrival || '\u2014'}</td>
      <td class="delay-${dc}">${delayStr}</td>
      <td>${statusBadge}</td>
    </tr>`;
  }
  if (!filtered.length) {
    rows = '<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:2rem">Nessun dato voli</td></tr>';
  }

  app.innerHTML = `
    <div class="flight-stats">
      ${flightStats.map(f => {
        const delayColor = f.avg === null ? '' : f.avg < 15 ? 'color:var(--green)' : f.avg <= 45 ? 'color:var(--gold)' : 'color:var(--red)';
        const delayStr = f.avg !== null ? (f.avg >= 0 ? '+' : '') + f.avg + 'm' : '\u2014';
        return `<div class="flight-stat">
          <div class="fs-label">${f.code}</div>
          <div style="font-size:.68rem;color:var(--muted);margin-top:.1rem">${f.label.split(' ')[1]}</div>
          <div style="font-size:.72rem;margin-top:.35rem">${f.count} tracciati</div>
          <div style="font-size:.65rem;color:var(--muted);margin-top:.15rem;line-height:1.4">${f.landedCount} landed${f.cancelledCount ? '<br>' + f.cancelledCount + ' cancelled' : ''}${f.enRouteCount ? '<br>' + f.enRouteCount + ' in flight' : ''}${f.scheduledCount ? '<br>' + f.scheduledCount + ' scheduled' : ''}</div>
          <div style="font-size:.72rem;${delayColor};font-weight:600;margin-top:.15rem">Delay medio: ${delayStr}</div>
          <div style="font-size:.72rem;margin-top:.15rem">Ultimo: ${f.latestStatus}</div>
        </div>`;
      }).join('')}
    </div>

    <div class="flight-filters">
      <span class="filter-label">Voli</span>
      ${filterBtns}
      <button class="flight-btn meta-btn" onclick="setAllFlights()">All</button>
      <button class="flight-btn meta-btn" onclick="setNoFlights()">None</button>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Data</th><th>Volo</th><th>Rotta</th><th>Dep sched</th><th>Dep actual</th><th>Arr sched</th><th>Arr actual</th><th>Delay</th><th>Status</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>

    <div class="meta" style="margin-top:.75rem">
      ${lastCheck ? '<span>Ultimo check: ' + timeAgo(lastCheck) + '</span>' : ''}
    </div>
  `;
}

function getFlightDelay(r) {
  if (r.arrival_delay_min !== null && r.arrival_delay_min !== undefined) return r.arrival_delay_min;
  if (r.departure_delay_min !== null && r.departure_delay_min !== undefined) return r.departure_delay_min;
  return null;
}

/* Scraping status */
let scrapingStatusVisible = false;

function toggleScrapingStatus() {
  scrapingStatusVisible = !scrapingStatusVisible;
  const el = document.getElementById('scraping-status');
  if (scrapingStatusVisible) {
    el.style.display = 'block';
    loadScrapingStatus();
  } else {
    el.style.display = 'none';
  }
}

async function loadScrapingStatus() {
  const sources = [
    { name: 'Ticketmaster', url: 'data/status.json' },
    { name: 'StubHub', url: 'data/stubhub.json' },
    { name: 'Emirates', url: 'data/flights.json', isFlights: true },
  ];
  let rows = '';
  for (const src of sources) {
    try {
      const resp = await fetch(src.url + '?t=' + Date.now());
      if (!resp.ok) throw new Error(resp.status);
      const d = await resp.json();
      if (src.isFlights) {
        const arr = Array.isArray(d) ? d : (d.flights || []);
        const lastCheck = Array.isArray(d) ? null : d.last_check;
        const landed = arr.filter(r => r.status && r.status.toLowerCase() === 'landed').length;
        rows += `<tr>
          <td>${src.name}</td>
          <td>${lastCheck ? timeAgo(lastCheck) : (arr.length ? 'Ultimo: ' + arr[0].date : 'Mai')}</td>
          <td>${arr.length} voli</td>
          <td>${landed} landed</td>
          <td>\u2014</td>
          <td><span style="color:var(--green)">OK</span></td>
        </tr>`;
      } else {
        const events = d.events || [];
        const totalPkgs = events.reduce((sum, e) => sum + (e.packages ? e.packages.length : 0), 0);
        const availPkgs = events.reduce((sum, e) => sum + (e.packages ? e.packages.filter(p => p.available).length : 0), 0);
        const status = d.errors && d.errors.length
          ? `<span style="color:var(--red)">${d.errors.length} errori</span>`
          : '<span style="color:var(--green)">OK</span>';
        rows += `<tr>
          <td>${src.name}</td>
          <td>${d.last_check ? timeAgo(d.last_check) : 'Mai'}</td>
          <td>${events.length}</td>
          <td>${totalPkgs} (${availPkgs} disp.)</td>
          <td>${d.checks_count || 0}</td>
          <td>${status}</td>
        </tr>`;
      }
    } catch {
      rows += `<tr>
        <td>${src.name}</td>
        <td colspan="5" style="color:var(--muted)">Dati non disponibili</td>
      </tr>`;
    }
  }

  document.getElementById('scraping-status').innerHTML = `
    <div class="card" style="margin-top:0">
      <h2>Stato Scraping</h2>
      <div style="overflow-x:auto">
        <table style="font-size:.78rem">
          <thead><tr>
            <th>Sorgente</th><th>Ultimo check</th><th>Eventi</th><th>Pacchetti</th><th>Controlli</th><th>Stato</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

load();
setInterval(load, 5 * 60 * 1000);
</script>

</html>
