<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WWE Ticket Monitor - 31 Maggio 2026</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a2e;
    --border: #2a2a4a;
    --text: #e0e0e0;
    --muted: #888;
    --green: #00c853;
    --red: #ff1744;
    --gold: #ffd600;
    --blue: #448aff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1rem;
  }
  .container { max-width: 900px; margin: 0 auto; }

  header {
    text-align: center;
    padding: 2rem 0 1rem;
  }
  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
  }
  header p { color: var(--muted); margin-top: .3rem; }

  .banner {
    text-align: center;
    padding: 1.5rem;
    border-radius: 12px;
    margin: 1.5rem 0;
    font-size: 1.3rem;
    font-weight: 700;
  }
  .banner.alert { background: linear-gradient(135deg, #00c853, #009624); color: #fff; }
  .banner.waiting { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
  .banner.error { background: #330011; border: 1px solid var(--red); color: var(--red); }

  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: center;
    margin: 1rem 0;
    font-size: .85rem;
    color: var(--muted);
  }
  .meta span { background: var(--surface); padding: .4rem .8rem; border-radius: 8px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    margin: 1.5rem 0;
  }
  .card h2 { font-size: 1rem; margin-bottom: .8rem; color: var(--gold); }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: .8rem;
    flex-wrap: wrap;
    gap: .5rem;
  }
  .card-header h2 { margin-bottom: 0; }
  .btn-group { display: flex; gap: .4rem; flex-wrap: wrap; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: .85rem;
  }
  th { text-align: left; color: var(--muted); font-weight: 500; padding: .5rem .4rem; border-bottom: 1px solid var(--border); }
  td { padding: .6rem .4rem; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: .75rem;
    font-weight: 600;
  }
  .tag.single { background: #1b5e20; color: var(--green); }
  .tag.combo { background: #4a1480; color: #ce93d8; }
  .tag.available { background: #1b5e20; color: var(--green); }
  .tag.unavailable { background: #4a0000; color: var(--red); }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .loading { text-align: center; padding: 3rem; color: var(--muted); }
  .footer { text-align: center; padding: 2rem 0; font-size: .75rem; color: var(--muted); }

  .toggle-btn {
    background: var(--border);
    color: var(--text);
    border: 1px solid var(--border);
    padding: .35rem .8rem;
    border-radius: 6px;
    font-size: .78rem;
    cursor: pointer;
    transition: all .2s;
  }
  .toggle-btn:hover { border-color: var(--blue); }
  .toggle-btn.active { background: #1b5e20; border-color: var(--green); color: var(--green); }

  .event-toggle {
    cursor: pointer;
    user-select: none;
  }
  .event-toggle:hover { background: rgba(255,255,255,.03); }
  .event-toggle td:first-child::before {
    content: '\25B6';
    display: inline-block;
    margin-right: .4rem;
    font-size: .7rem;
    transition: transform .2s;
    color: var(--muted);
  }
  .event-toggle.open td:first-child::before {
    transform: rotate(90deg);
  }
  .pkg-row { display: none; }
  .pkg-row.visible { display: table-row; }
  .pkg-row td { padding-left: 1.5rem; font-size: .8rem; color: var(--muted); border-bottom: 1px solid rgba(42,42,74,.5); }
  .pkg-row.unavailable-row { opacity: .5; }

  @media (max-width: 600px) {
    header h1 { font-size: 1.2rem; }
    .banner { font-size: 1rem; padding: 1rem; }
    table { font-size: .78rem; }
    .hide-mobile { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>WWE Ticket Monitor - 31 Maggio 2026 &#127470;&#127481;</h1>
    <p>Monitoraggio biglietti singoli sotto 400&euro;</p>
  </header>

  <div id="app">
    <div class="loading">Caricamento dati&hellip;</div>
  </div>

  <div class="footer">
    Auto-refresh ogni 5 minuti &bull; Dati aggiornati ogni 15 min via Docker
  </div>
</div>

<script>
const DATA_URL = 'data/status.json';
let showOnlyAvailable = true;
let allExpanded = false;

function timeAgo(iso) {
  if (!iso) return '\u2014';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return `${Math.round(diff)}s fa`;
  if (diff < 3600) return `${Math.round(diff / 60)}min fa`;
  if (diff < 86400) return `${Math.round(diff / 3600)}h fa`;
  return `${Math.round(diff / 86400)}g fa`;
}

function fmtDate(d) {
  if (!d) return '\u2014';
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function fmtPrice(p, currency) {
  if (p == null) return '\u2014';
  return `${p.toLocaleString('it-IT', {minimumFractionDigits: 2, maximumFractionDigits: 2})} ${currency || '\u20AC'}`;
}

let currentData = null;

function render(data) {
  currentData = data;
  const app = document.getElementById('app');

  // Banner
  let bannerClass, bannerText;
  if (data.errors && data.errors.length && !data.events.length) {
    bannerClass = 'error';
    bannerText = 'Errore nel controllo \u2014 riprovo tra 15 min';
  } else if (data.alert_active) {
    bannerClass = 'alert';
    bannerText = 'BIGLIETTI SINGOLI TROVATI SOTTO 400\u20AC!';
  } else {
    bannerClass = 'waiting';
    bannerText = 'Non ancora disponibili biglietti singoli sotto 400\u20AC';
  }

  // Events + packages
  let rows = '';
  for (let ei = 0; ei < (data.events || []).length; ei++) {
    const e = data.events[ei];
    const tag = e.is_single_day
      ? '<span class="tag single">Singolo</span>'
      : '<span class="tag combo">Combo</span>';
    const link = e.url ? `<a href="${e.url}" target="_blank" rel="noopener">Acquista</a>` : '\u2014';
    const hasPkgs = e.packages && e.packages.length > 0;
    const toggleClass = hasPkgs ? 'event-toggle' : '';

    // Compute min/max based on filter
    let pMin = e.price_min, pMax = e.price_max;
    if (hasPkgs) {
      const filtered = showOnlyAvailable ? e.packages.filter(p => p.available) : e.packages;
      if (filtered.length) {
        const prices = filtered.map(p => p.price);
        pMin = Math.min(...prices);
        pMax = Math.max(...prices);
      } else {
        pMin = null;
        pMax = null;
      }
    }

    const venue = e.venue ? `<br><span style="font-size:.75rem;color:var(--muted)">${e.venue}</span>` : '';
    const openClass = allExpanded && hasPkgs ? ' open' : '';

    rows += `<tr class="${toggleClass}${openClass}" ${hasPkgs ? `onclick="togglePackages(${ei})" data-event="${ei}"` : ''}>
      <td>${e.name || '\u2014'}${venue}</td>
      <td>${fmtDate(e.date)}</td>
      <td>${tag}</td>
      <td>${fmtPrice(pMin, e.currency)}</td>
      <td class="hide-mobile">${fmtPrice(pMax, e.currency)}</td>
      <td>${link}</td>
    </tr>`;

    if (hasPkgs) {
      for (const pkg of e.packages) {
        const statusTag = pkg.available
          ? '<span class="tag available">Disponibile</span>'
          : '<span class="tag unavailable">Non disponibile</span>';
        const shouldShow = allExpanded && (pkg.available || !showOnlyAvailable);
        const hideClass = shouldShow ? 'visible' : '';
        const unavailClass = pkg.available ? '' : 'unavailable-row';
        rows += `<tr class="pkg-row pkg-event-${ei} ${hideClass} ${unavailClass}" data-available="${pkg.available}">
          <td>${pkg.name}</td>
          <td colspan="2">${statusTag}</td>
          <td>${fmtPrice(pkg.price, e.currency)}</td>
          <td class="hide-mobile" colspan="2"></td>
        </tr>`;
      }
    }
  }
  if (!data.events || !data.events.length) {
    rows = '<tr><td colspan="6" style="text-align:center;color:var(--muted)">Nessun evento trovato</td></tr>';
  }

  // Errors
  let errHtml = '';
  if (data.errors && data.errors.length) {
    errHtml = `<div class="card" style="border-color:var(--red)"><h2 style="color:var(--red)">Errori</h2><ul style="padding-left:1.2rem;font-size:.82rem">${data.errors.map(e => `<li>${e}</li>`).join('')}</ul></div>`;
  }

  const filterBtnClass = showOnlyAvailable ? 'toggle-btn active' : 'toggle-btn';
  const filterLabel = showOnlyAvailable ? 'Solo disponibili' : 'Tutti i pacchetti';
  const expandLabel = allExpanded ? 'Comprimi tutto' : 'Espandi tutto';

  app.innerHTML = `
    <div class="banner ${bannerClass}">${bannerText}</div>

    <div class="meta">
      <span>Ultimo check: ${timeAgo(data.last_check)}</span>
      <span>Controlli: ${data.checks_count || 0}</span>
      <span>Soglia: ${data.threshold_eur || 400}\u20AC</span>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Eventi e Pacchetti</h2>
        <div class="btn-group">
          <button class="toggle-btn" onclick="toggleExpandAll()">${expandLabel}</button>
          <button class="${filterBtnClass}" onclick="toggleFilter()">${filterLabel}</button>
        </div>
      </div>
      <p style="font-size:.78rem;color:var(--muted);margin-bottom:.8rem">Clicca su un evento per vedere i pacchetti</p>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Evento</th><th>Data</th><th>Tipo</th><th>Min</th><th class="hide-mobile">Max</th><th>Link</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>

    ${errHtml}
  `;
}

function togglePackages(eventIndex) {
  const row = document.querySelector(`tr[data-event="${eventIndex}"]`);
  const pkgRows = document.querySelectorAll(`.pkg-event-${eventIndex}`);
  const isOpen = row.classList.contains('open');

  if (isOpen) {
    row.classList.remove('open');
    pkgRows.forEach(r => r.classList.remove('visible'));
  } else {
    row.classList.add('open');
    pkgRows.forEach(r => {
      if (showOnlyAvailable && r.dataset.available === 'false') return;
      r.classList.add('visible');
    });
  }
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  if (currentData) render(currentData);
}

function toggleFilter() {
  showOnlyAvailable = !showOnlyAvailable;
  if (currentData) render(currentData);
}

async function load() {
  try {
    const resp = await fetch(DATA_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error(resp.status);
    render(await resp.json());
  } catch (e) {
    console.error('Load error:', e);
    document.getElementById('app').innerHTML =
      `<div class="banner waiting">Nessun dato disponibile \u2014 il primo check non \u00E8 ancora stato eseguito</div>`;
  }
}

load();
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
